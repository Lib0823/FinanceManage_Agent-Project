databaseChangeLog:
  - changeSet:
      id: v1.4-insert-test-user
      author: claude
      context: mvp
      comment: Insert test user for MVP development
      validCheckSum: 9:4f240d573f73b3efd5097802c973f48d
      changes:
        - insert:
            tableName: users
            columns:
              - column:
                  name: id
                  valueNumeric: 1
              - column:
                  name: username
                  value: testuser
              - column:
                  name: password
                  value: $2a$10$/U1REQmacvXIn72utqxk6eXs9dyBAV56fnOeRwMym7TTDry48stFC  # "password123" encoded with BCrypt
              - column:
                  name: email
                  value: test@example.com
              - column:
                  name: name
                  value: 테스트유저
              - column:
                  name: phone
                  value: 01012345678
              - column:
                  name: birth_date
                  valueDate: 1990-01-01
              - column:
                  name: created_at
                  valueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  valueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: v1.4-insert-test-kis-account
      author: claude
      context: mvp
      comment: Insert test KIS account (mock credentials for testing)
      changes:
        - insert:
            tableName: user_kis_accounts
            columns:
              - column:
                  name: id
                  valueNumeric: 1
              - column:
                  name: user_id
                  valueNumeric: 1
              - column:
                  name: account_number
                  value: "50000000"
              - column:
                  name: account_product_code
                  value: "01"
              - column:
                  name: app_key
                  value: ENC(test_encrypted_app_key_placeholder)
              - column:
                  name: app_secret
                  value: ENC(test_encrypted_app_secret_placeholder)
              - column:
                  name: is_verified
                  valueBoolean: true
              - column:
                  name: created_at
                  valueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  valueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: v1.4-insert-test-trade-config
      author: claude
      context: mvp
      comment: Insert test trade configuration
      changes:
        - insert:
            tableName: user_trade_config
            columns:
              - column:
                  name: id
                  valueNumeric: 1
              - column:
                  name: user_id
                  valueNumeric: 1
              - column:
                  name: order_amount
                  valueNumeric: 1000000
              - column:
                  name: max_holdings
                  valueNumeric: 10
              - column:
                  name: order_type
                  value: market
              - column:
                  name: is_active
                  valueBoolean: false
              - column:
                  name: created_at
                  valueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  valueComputed: CURRENT_TIMESTAMP

