services:
  postgres:
    image: postgres:16
    container_name: financemanage-postgres
    environment:
      POSTGRES_DB: financemanage
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/mvp-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - financemanage-network
    restart: unless-stopped

